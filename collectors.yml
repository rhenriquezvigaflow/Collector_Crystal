backend:
  url: "http://127.0.0.1:8090/ingest/scada"
  timeout_sec: 15
  pool_connections: 1
  pool_maxsize: 1

product_type: "crystal"

runtime:

  send_queue_maxsize: 1
  send_queue_full_policy: "drop_oldest"
  spool_on_send_fail: true
  replay_spool_batch_size: 1
  max_replay_payload_age_sec: 8
  send_retry_attempts: 0
  send_retry_backoff_base_sec: 1
  send_retry_backoff_max_sec: 8
  startup_jitter_max_sec: 1

plcs:
  - include: "config/lagoon_aquavista.yml"
  - include: "config/lagoon_costadellago.yml"
  - include: "config/laguna_baia_kristal.yml"
  - include: "config/Ava_lagoons.yml"
  - include: "config/santa_rosalia.yml"
  - include: "config/central_hub_dubai.yml"
  - include: "config/laguna_central_district.yml"
  - include: "config/laguna_mountain_view.yml"
  - include: "config/kirah.yml"
  - include: "config/ary.yml"
  - include: "config/nyah.yml"
  - include: "config/small_sim.yml"
    product_type: "small"
